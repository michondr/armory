packages:
  - "apps/*"
  - "packages/*"

# Allow these dependencies to run install/build scripts:
# native compilation (argon2), platform binaries (esbuild), engine downloads (prisma).
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  argon2: true
  esbuild: true
  prisma: true

onlyBuiltDependencies:
  - "@prisma/client"
  - "@prisma/engines"
  - argon2
  - esbuild
  - prisma
